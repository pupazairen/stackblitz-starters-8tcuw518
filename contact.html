<!DOCTYPE html>

<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact | Azairen Studios</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap"
      rel="stylesheet"
    />

    <style>
      body {
        font-family: 'Inter', sans-serif;
      }

      .input {
        background: black;
        border: 1px solid #333;
        padding: 12px;
        width: 100%;
        color: white;
      }

      .input:focus {
        outline: none;
        border-color: white;
      }
    </style>
  </head>

  <body class="bg-black text-white">
    <!-- NAV -->

    <header
      class="fixed top-0 left-0 w-full bg-black/80 backdrop-blur border-b border-gray-800 z-50"
    >
      <nav
        class="max-w-7xl mx-auto flex justify-between items-center px-6 py-4"
      >
        <a href="/index.html" class="text-xl font-semibold tracking-wide">
          AZAIREN
        </a>

        <div class="space-x-6 text-sm text-gray-300">
          <a href="/index.html" class="hover:text-white">Home</a>
          <a href="/universes/index.html" class="hover:text-white">Universes</a>
          <a href="/universes/characters/index.html" class="hover:text-white"
            >Characters</a
          >
          <a href="/mithbusters/index.html" class="hover:text-white"
            >Mithbusters</a
          >
          <a href="/projects.html" class="hover:text-white">Projects</a>
          <a href="/business.html" class="hover:text-white">Studio</a>
          <a href="/contact.html" class="text-white">Contact</a>
        </div>
      </nav>
    </header>

    <!-- HEADER -->

    <section class="pt-32 pb-16 text-center px-6">
      <h1 class="text-4xl mb-4">CONTACT</h1>
      <p class="text-gray-500 text-sm">Submit inquiry to system.</p>
    </section>

    <!-- FORM -->

    <section>
      <form
        action="https://formspree.io/f/xeevdday"
        method="POST"
        class="space-y-6"
      >
        <label>
          <input
            type="text"
            name="name"
            class="input"
            placeholder="Enter identifier"
          />
        </label>
        <label>
          <input
            type="email"
            name="email"
            class="input"
            placeholder="Contact channel"
          />
        </label>
        <label>
          <input
            type="text"
            name="subject"
            class="input"
            placeholder="Reason for inquiry"
          />
        </label>
        <label>
          <textarea
            name="message"
            class="input h-32"
            placeholder="Submit message..."
          ></textarea>
        </label>
        <!-- your other form fields go here -->
        <button type="submit">Send</button>

        <input
          type="hidden"
          name="_redirect"
          value="https://yourdomain.com/thank-you.html"
        />
      </form>
    </section>

    <!-- SYSTEM NOTE -->

    <section class="text-center pb-20">
      <p class="text-gray-600 text-xs">Response is not guaranteed.</p>
    </section>

    <!-- FOOTER -->

    <footer
      class="border-t border-gray-800 py-10 text-center text-gray-500 text-sm"
    >
      © 2026 Azairen Studios. All systems active.
    </footer>
  </body>
</html>
